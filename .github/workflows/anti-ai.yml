name: anti-ai

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# CI backstop for the local git hooks in ~/.config/git/hooks/.
# Pattern source of truth: ~/.config/git/anti-ai.lib.sh.
# Canonical workflow copy: ~/workspace/tools/anti-ai/anti-ai.yml.

jobs:
  scan:
    name: scan for AI traces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI-tool config files
        run: |
          set -e
          AI_FILE_REGEX='(^|/)(CLAUDE|GEMINI|AGENTS|COPILOT|CURSOR|AIDER|CODEX|WINDSURF|CONTINUE|CLINE|ROO|CODY|DEVIN|TABNINE|CODEIUM|PHIND|BITO|SUPERMAVEN|AUGMENT|TWINNY|PIECES|PEARAI|BLACKBOX|GOOSE|MINTLIFY|SWEEP)\.md$|^\.(claude|cursor|aider|continue|codeium|windsurf|copilot|openhands|codex|cody|cline|roo|specstory|chatgpt|aichat|repomix|devin|tabnine|tabnine_root|phind|bito|supermaven|augment|twinny|pieces|pearai|pear-ai|zed-ai|zedai|goose|blackbox|mintlify|sweep|amazonq|amazon-q|q-developer|jetbrains-ai|jetbrains_ai|magic-dev|aws-q)([/.-]|$)|copilot-instructions\.md$|\.geminiignore$|\.aiderignore$|\.cursorrules$|\.cursorignore$|\.clinerules$|\.specstoryignore$|\.codeiumignore$|\.tabnineignore$|(^|/)Cursorfile$'
          hits=$(git ls-files | grep -E "$AI_FILE_REGEX" || true)
          if [ -n "$hits" ]; then
            echo "::error::AI-tool config files committed:"
            echo "$hits" | sed 's|^|  |'
            exit 1
          fi
          echo "ok: no AI-tool config files"

      - name: em dash + smart quotes in tracked content
        run: |
          set -e
          em=$(printf '\xe2\x80\x94')
          sq1=$(printf '\xe2\x80\x9c')
          sq2=$(printf '\xe2\x80\x9d')
          sq3=$(printf '\xe2\x80\x98')
          sq4=$(printf '\xe2\x80\x99')
          pattern="$em|$sq1|$sq2|$sq3|$sq4"
          hits=$(git grep -lE "$pattern" -- ':!.github/workflows/anti-ai.yml' 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::em dashes or smart quotes in tracked content:"
            echo "$hits" | sed 's|^|  |'
            exit 1
          fi
          echo "ok: no em dashes or smart quotes"

      - name: U+2026 ellipsis in prose
        run: |
          set -e
          ell=$(printf '\xe2\x80\xa6')
          prose=$(git ls-files '*.md' '*.rst' '*.txt' | grep -v 'anti-ai' || true)
          if [ -z "$prose" ]; then
            echo "ok: no prose files to scan"
            exit 0
          fi
          hits=$(echo "$prose" | xargs grep -lF "$ell" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::U+2026 ellipsis in prose (use ASCII '...' instead):"
            echo "$hits" | sed 's|^|  |'
            exit 1
          fi
          echo "ok: no ellipsis in prose"

      - name: typographic tells + AI markers in commit messages
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="${{ github.event.before }}..${{ github.event.after }}"
            if ! git rev-parse "${{ github.event.before }}" >/dev/null 2>&1; then
              range="${{ github.sha }} -1"
            fi
          fi
          em=$(printf '\xe2\x80\x94')
          sq1=$(printf '\xe2\x80\x9c')
          sq2=$(printf '\xe2\x80\x9d')
          sq3=$(printf '\xe2\x80\x98')
          sq4=$(printf '\xe2\x80\x99')
          ell=$(printf '\xe2\x80\xa6')
          robot=$(printf '\xf0\x9f\xa4\x96')
          TYPO_REGEX="$em|$sq1|$sq2|$sq3|$sq4|$ell"
          AI_MARKER_REGEX="Co-Authored-By:.*(claude|copilot|cursor|gpt|anthropic|openai|noreply@anthropic|chatgpt|aider|continue|devin|sourcegraph|cody|tabnine|codeium|windsurf|phind|bito|sweep|mintlify|amazon-?q|q-?developer|blackbox|supermaven|augment|goose|pear-?ai|cline|roo|magic-?dev)|${robot}|Generated with \\[?(Claude|Copilot|Cursor|Devin|Aider|Continue|Cody|Tabnine|Codeium|Windsurf|Bito|GPT|ChatGPT|Phind)|Generated by (Claude Code|GitHub Copilot|Cursor|Devin|Aider|Cody|Sourcegraph|Tabnine|Codeium|Windsurf|Bito|ChatGPT|GPT-?[0-9]|Amazon Q|Q Developer|Blackbox|Supermaven|Augment|Goose)|Co-?Author(ed)?-?By.*\\[bot\\]|Authored-by-AI"
          bad=0
          for sha in $(git rev-list $range 2>/dev/null || true); do
            msg=$(git log -1 --format='%B' "$sha")
            if echo "$msg" | grep -qE "$TYPO_REGEX"; then
              echo "::error::typographic AI tell in commit $sha: $(echo "$msg" | head -1)"
              bad=1
            fi
            if echo "$msg" | grep -qE "$AI_MARKER_REGEX"; then
              echo "::error::AI marker in commit $sha: $(echo "$msg" | head -1)"
              bad=1
            fi
          done
          [ "$bad" = "0" ] && echo "ok: commit messages clean"
          exit "$bad"

      - name: AI-cliche vocabulary in prose
        run: |
          set -e
          AI_VOCAB_REGEX='\b(comprehensive|robust|extensible|scalable|enterprise[- ]grade|battle[- ]tested|production[- ]ready|fully[- ]featured|modular architecture|seamless|leverage|elevate|delve|tapestry|navigate the|embark|elegantly|meticulously|intricate|pivotal|paramount|quintessential|holistic|empower|state[- ]of[- ]the[- ]art|cutting[- ]edge)\b'
          prose=$(git ls-files '*.md' '*.rst' '*.txt' | grep -v 'anti-ai' || true)
          if [ -z "$prose" ]; then
            echo "ok: no prose files to scan"
            exit 0
          fi
          hits=$(echo "$prose" | xargs grep -lEi "$AI_VOCAB_REGEX" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::AI-cliche vocabulary in prose:"
            echo "$hits" | sed 's|^|  |'
            exit 1
          fi
          echo "ok: no AI-cliche vocabulary"
