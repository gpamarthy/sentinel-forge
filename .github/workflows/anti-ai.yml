name: anti-ai

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    name: scan for AI traces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI-tool config files
        run: |
          set -e
          AI_FILE_REGEX='(^|/)(CLAUDE|GEMINI|AGENTS|COPILOT|CURSOR|AIDER|CODEX|WINDSURF|CONTINUE|CLINE|ROO|CODY)\.md$|^\.(claude|cursor|aider|continue|codeium|windsurf|copilot|openhands|codex|cody|cline|roo|specstory|chatgpt|aichat|repomix)([/.-]|$)|copilot-instructions\.md$|\.geminiignore$|\.aiderignore$|\.cursorrules$|\.clinerules$|\.specstoryignore$'
          hits=$(git ls-files | grep -E "$AI_FILE_REGEX" || true)
          if [ -n "$hits" ]; then
            echo "::error::AI-tool config files committed:"
            echo "$hits" | sed 's|^|  |'
            exit 1
          fi
          echo "ok: no AI-tool config files"

      - name: em dashes in tracked content
        run: |
          set -e
          em=$(printf '\xe2\x80\x94')
          hits=$(git grep -l "$em" -- ':!.github/workflows/anti-ai.yml' 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::em dashes (U+2014) in tracked content:"
            echo "$hits" | sed 's|^|  |'
            exit 1
          fi
          echo "ok: no em dashes"

      - name: em dashes / AI markers in commit messages
        run: |
          set -e
          # Determine the range to scan
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="${{ github.event.before }}..${{ github.event.after }}"
            # On a force-push or first push, fall back to scanning the head commit only
            if ! git rev-parse "${{ github.event.before }}" >/dev/null 2>&1; then
              range="${{ github.sha }} -1"
            fi
          fi
          em=$(printf '\xe2\x80\x94')
          robot=$(printf '\xf0\x9f\xa4\x96')
          AI_MARKER_REGEX="Co-Authored-By:.*(claude|copilot|cursor|gpt|anthropic|openai|noreply@anthropic|chatgpt|aider|continue)|${robot}|Generated with \\[?Claude|Generated by Claude Code|Co-?Author(ed)?-?By.*\\[bot\\]"
          bad=0
          for sha in $(git rev-list $range 2>/dev/null || true); do
            msg=$(git log -1 --format='%B' "$sha")
            if echo "$msg" | grep -qF "$em"; then
              echo "::error::em dash in commit $sha: $(echo "$msg" | head -1)"
              bad=1
            fi
            if echo "$msg" | grep -qE "$AI_MARKER_REGEX"; then
              echo "::error::AI marker in commit $sha: $(echo "$msg" | head -1)"
              bad=1
            fi
          done
          [ "$bad" = "0" ] && echo "ok: commit messages clean"
          exit "$bad"
